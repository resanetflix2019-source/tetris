<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tetris</title>
    <style>
        /* ===== NASIL ÇALIŞTIRILIR =====
         * Bu dosyayı herhangi bir modern tarayıcıda açın (Chrome, Firefox, Edge, Safari).
         * Başka bir şey yüklemenize gerek yok - hemen oynamaya başlayabilirsiniz!
         */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        #left-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 15px;
            border: 2px solid rgba(100, 255, 218, 0.3);
            box-shadow: 0 0 20px rgba(100, 255, 218, 0.1);
        }

        .panel h3 {
            margin-bottom: 10px;
            color: #64ffda;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #hold-canvas, #next-canvas {
            display: block;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }

        #main-canvas {
            display: block;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(100, 255, 218, 0.2),
                        inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #right-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 16px;
        }

        .stat-label {
            color: #a8b2d1;
        }

        .stat-value {
            color: #64ffda;
            font-weight: bold;
            font-size: 18px;
        }

        #controls {
            font-size: 12px;
            line-height: 1.6;
            color: #8892b0;
        }

        #controls h3 {
            color: #64ffda;
            margin-bottom: 8px;
        }

        #controls p {
            margin: 4px 0;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #overlay.active {
            display: flex;
        }

        .overlay-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid #64ffda;
            box-shadow: 0 0 50px rgba(100, 255, 218, 0.5);
        }

        .overlay-content h2 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #64ffda;
            text-shadow: 0 0 20px rgba(100, 255, 218, 0.8);
        }

        .overlay-content p {
            font-size: 20px;
            margin: 10px 0;
            color: #a8b2d1;
        }

        .overlay-content button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #64ffda 0%, #00bfa5 100%);
            color: #0a0a0a;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(100, 255, 218, 0.4);
        }

        .overlay-content button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(100, 255, 218, 0.6);
        }

        #settings {
            margin-top: 15px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }

        .toggle {
            position: relative;
            width: 50px;
            height: 24px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle.active {
            background: #64ffda;
        }

        .toggle::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: left 0.3s;
        }

        .toggle.active::after {
            left: 29px;
        }

        #notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #64ffda;
            text-shadow: 0 0 30px rgba(100, 255, 218, 0.8);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 999;
        }

        #notification.show {
            opacity: 1;
        }

        @media (max-width: 768px) {
            #game-container {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>

<body>
    <div id="game-container">
        <div id="left-panel">
            <div class="panel">
                <h3>Hold</h3>
                <canvas id="hold-canvas" width="120" height="120"></canvas>
            </div>
            <div class="panel">
                <h3>Next</h3>
                <canvas id="next-canvas" width="120" height="120"></canvas>
            </div>
        </div>

        <div>
            <canvas id="main-canvas" width="300" height="600"></canvas>
        </div>

        <div id="right-panel">
            <div class="panel">
                <h3>İstatistikler</h3>
                <div class="stat">
                    <span class="stat-label">Skor:</span>
                    <span class="stat-value" id="score">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Seviye:</span>
                    <span class="stat-value" id="level">1</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Satırlar:</span>
                    <span class="stat-value" id="lines">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">En Yüksek:</span>
                    <span class="stat-value" id="high-score">0</span>
                </div>
            </div>

            <div class="panel" id="settings">
                <h3>Ayarlar</h3>
                <div class="setting-item">
                    <span>Hayalet</span>
                    <div class="toggle active" id="ghost-toggle"></div>
                </div>
                <div class="setting-item">
                    <span>Ses</span>
                    <div class="toggle active" id="sound-toggle"></div>
                </div>
            </div>

            <div class="panel" id="controls">
                <h3>Kontroller</h3>
                <p>← → : Hareket</p>
                <p>↓ : Soft Drop</p>
                <p>Space : Hard Drop</p>
                <p>Z : Sola Döndür</p>
                <p>X/↑ : Sağa Döndür</p>
                <p>C : Hold</p>
                <p>P : Pause</p>
                <p>R : Restart</p>
            </div>
        </div>
    </div>

    <div id="overlay">
        <div class="overlay-content">
            <h2 id="overlay-title">PAUSE</h2>
            <p id="overlay-message">Devam etmek için P'ye basın</p>
            <button id="restart-btn" style="display: none;">Yeniden Başla (R)</button>
        </div>
    </div>

        // ==================== OYUN DURUMU ====================
        class Game {
            constructor() {
                this.board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
                this.score = 0;
                this.lines = 0;
                this.level = 1;
                this.highScore = parseInt(localStorage.getItem('tetrisHighScore') || '0');
                this.gameOver = false;
                this.paused = false;
                this.busy = false;
                this.bag = [];
                this.currentPiece = null;
                this.nextPiece = null;
                this.holdPiece = null;
                this.canHold = true;
                this.dropCounter = 0;
                this.dropInterval = 1000;
                this.lockDelay = 500;
                this.lockCounter = 0;
                this.isLocking = false;
                this.lockResets = 0;
                this.maxLockResets = 15;
                this.busy = false; // satır temizleme animasyonu sırasında input/drop kilidi
                this.combo = -1;
                this.backToBack = -1;
                this.lastClearWasTetris = false;
                this.ghostEnabled = true;
                this.soundEnabled = true;
                
                this.initPieces();
                this.updateUI();
            }

            initPieces() {
                this.nextPiece = this.getNextPiece();
                this.spawnPiece();
            }

            getNextPiece() {
                if (this.bag.length === 0) {
                    this.bag = ['I', 'O', 'T', 'S', 'Z', 'J', 'L'];
                    for (let i = this.bag.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [this.bag[i], this.bag[j]] = [this.bag[j], this.bag[i]];
                    }
                }
                const type = this.bag.pop();
                return new Piece(type);
            }

            spawnPiece() {
                this.currentPiece = this.nextPiece;
                this.nextPiece = this.getNextPiece();
                this.currentPiece.x = Math.floor(COLS / 2) - Math.floor(this.currentPiece.shape[0].length / 2);
                this.currentPiece.y = 0;
                this.canHold = true;
                this.isLocking = false;
                this.lockCounter = 0;
                this.lockResets = 0;
                this.busy = false;

                if (this.checkCollision(this.currentPiece)) {
                    this.gameOver = true;
                    audio.playGameOver();
                    this.showGameOver();
                }
            }

            checkCollision(piece, offsetX = 0, offsetY = 0) {
                for (let y = 0; y < piece.shape.length; y++) {
                    for (let x = 0; x < piece.shape[y].length; x++) {
                        if (piece.shape[y][x]) {
                            const newX = piece.x + x + offsetX;
                            const newY = piece.y + y + offsetY;
                            
                            if (newX < 0 || newX >= COLS || newY >= ROWS) {
                                return true;
                            }
                            if (newY >= 0 && this.board[newY][newX]) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }

            onPieceAdjusted() {
                // Parça zemine değmişken (locking) hareket/rotate yapılırsa lock delay'i sıfırla.
                // Sonsuza kadar ertelemeyi engellemek için reset sayısını limitliyoruz.
                if (this.isLocking && this.lockResets < this.maxLockResets) {
                    this.lockCounter = 0;
                    this.lockResets++;
                }
            }

            movePiece(dx, dy, opts = { softDrop: false, manual: false }) {
                if (!this.currentPiece) return false;
                if (!this.checkCollision(this.currentPiece, dx, dy)) {
                    this.currentPiece.x += dx;
                    this.currentPiece.y += dy;

                    // Sadece MANUEL soft drop puan kazandırsın (yerçekimi değil)
                    if (opts.softDrop && dy > 0) this.score += 1;

                    // Kilitlenme (lock) sırasında manuel hareket/dönüş lock delay'i resetlesin
                    if (opts.manual) this.onPieceAdjusted();

                    audio.playMove();
                    return true;
                }
                return false;
            }

            rotatePiece(clockwise = true) {
                const oldRotation = this.currentPiece.rotation;
                const oldShape = this.currentPiece.shape;
                
                this.currentPiece.rotate(clockwise);
                
                // Wall kick testi
                const kickKey = this.currentPiece.type === 'I' ? 'I' : 'JLSTZ';
                // Kick tabloları "old->new" formatında
                const rotationKey = `${oldRotation}->${this.currentPiece.rotation}`;
const kicks = this.currentPiece.type === 'O' ? [[0,0]] : 
                              (WALL_KICKS[kickKey][rotationKey] || [[0,0]]);
                
                // İlk test: kick olmadan
                if (!this.checkCollision(this.currentPiece)) {
                    this.onPieceAdjusted();
                    audio.playRotate();
                    return true;
                }
                
                // Wall kick testleri
                for (const [dx, dy] of kicks) {
                    if (!this.checkCollision(this.currentPiece, dx, dy)) {
                        this.currentPiece.x += dx;
                        this.currentPiece.y += dy;
                        this.onPieceAdjusted();
                        audio.playRotate();
                        return true;
                    }
                }
                
                // Başarısız, geri al
                this.currentPiece.shape = oldShape;
                this.currentPiece.rotation = oldRotation;
                return false;
            }

            hardDrop() {
                if (!this.currentPiece) return;
                let dropDistance = 0;
                while (!this.checkCollision(this.currentPiece, 0, 1)) {
                    this.currentPiece.y++;
                    dropDistance++;
                }
                this.score += dropDistance * 2;
                this.lockPiece();
                audio.playDrop();
            }

            holdCurrentPiece() {
                if (!this.canHold) return;
                
                if (this.holdPiece === null) {
                    this.holdPiece = new Piece(this.currentPiece.type);
                    this.spawnPiece();
                } else {
                    const temp = this.holdPiece;
                    this.holdPiece = new Piece(this.currentPiece.type);
                    this.currentPiece = temp;
                    this.currentPiece.x = Math.floor(COLS / 2) - Math.floor(this.currentPiece.shape[0].length / 2);
                    this.currentPiece.y = 0;
                }
                
                this.canHold = false;
                this.isLocking = false;
                this.lockCounter = 0;
                this.lockResets = 0;
                audio.playMove();
            }

            lockPiece() {
                // Taşı board'a işle
                for (let y = 0; y < this.currentPiece.shape.length; y++) {
                    for (let x = 0; x < this.currentPiece.shape[y].length; x++) {
                        if (this.currentPiece.shape[y][x]) {
                            const boardY = this.currentPiece.y + y;
                            const boardX = this.currentPiece.x + x;
                            if (boardY >= 0) {
                                this.board[boardY][boardX] = this.currentPiece.type;
                            }
                        }
                    }
                }

                // Aktif parçayı input'tan çıkar (satır temizleme varsa animasyon süresince null kalsın)
                this.currentPiece = null;

                const linesToClear = this.clearLines();

                if (linesToClear.length > 0) {
                    this.busy = true;

                    // Animasyon
                    renderer.animateLineClear(linesToClear, this);

                    // Temizleme + yeni parça spawn'ı ANİMASYONDAN SONRA
                    setTimeout(() => {
                        this.applyLineClear(linesToClear);
                        this.busy = false;
                        this.spawnPiece();
                    }, 300);
                } else {
                    // Satır yoksa hemen devam
                    this.combo = -1;
                    this.spawnPiece();
                }
            }

            clearLines() {
                const linesToClear = [];
                for (let y = ROWS - 1; y >= 0; y--) {
                    if (this.board[y].every(cell => cell !== 0)) {
                        linesToClear.push(y);
                    }
                }
                return linesToClear;
            }

            applyLineClear(linesToClear) {
                const linesCleared = linesToClear.length;
                if (linesCleared <= 0) {
                    this.combo = -1;
                    return 0;
                }

                // Satırları temizle (alttan üste doğru)
                linesToClear.sort((a, b) => a - b);
                for (const y of linesToClear) {
                    this.board.splice(y, 1);
                    this.board.unshift(Array(COLS).fill(0));
                }

                this.lines += linesCleared;

                // Skor hesaplama
                let points = SCORE_VALUES[linesCleared] * this.level;

                // Combo bonus
                this.combo++;
                if (this.combo > 0) {
                    points += 50 * this.combo * this.level;
                }

                // Back-to-back Tetris bonus
                if (linesCleared === 4) {
                    if (this.lastClearWasTetris) {
                        points = Math.floor(points * 1.5);
                        this.showNotification('TETRIS! B2B!');
                    } else {
                        this.showNotification('TETRIS!');
                    }
                    this.lastClearWasTetris = true;
                } else {
                    this.lastClearWasTetris = false;
                    if (linesCleared === 3) this.showNotification('Triple!');
                    else if (linesCleared === 2) this.showNotification('Double!');
                    else this.showNotification('Nice!');
                }

                this.score += points;

                // Seviye artışı
                this.level = Math.floor(this.lines / 10) + 1;
                this.dropInterval = Math.max(100, 1000 - (this.level - 1) * 50);

                audio.playLineClear();
                this.updateUI();
                return linesCleared;
            }

            update(deltaTime) {
                if (this.gameOver || this.paused || this.busy) return;
                
                this.dropCounter += deltaTime;
                
                // Lock delay mekanizması
                if (this.checkCollision(this.currentPiece, 0, 1)) {
                    if (!this.isLocking) {
                        this.isLocking = true;
                        this.lockCounter = 0;
                    }
                    this.lockCounter += deltaTime;
                    
                    if (this.lockCounter >= this.lockDelay) {
                        this.lockPiece();
                    }
                } else {
                    this.isLocking = false;
                    this.lockCounter = 0;
                }
                
                if (this.dropCounter > this.dropInterval) {
                    this.movePiece(0, 1, { softDrop: false, manual: false });
                    this.dropCounter = 0;
                }
            }

            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
                document.getElementById('high-score').textContent = this.highScore;
                
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    try {
                        localStorage.setItem('tetrisHighScore', this.highScore.toString());
                    } catch (e) {
                        console.warn('LocalStorage not available');
                    }
                    document.getElementById('high-score').textContent = this.highScore;
                }
            }

            showGameOver() {
                document.getElementById('overlay-title').textContent = 'GAME OVER';
                document.getElementById('overlay-message').textContent = `Skor: ${this.score}`;
                document.getElementById('restart-btn').style.display = 'block';
                document.getElementById('overlay').classList.add('active');
            }

            showNotification(text) {
                const notif = document.getElementById('notification');
                notif.textContent = text;
                notif.classList.add('show');
                setTimeout(() => notif.classList.remove('show'), 1000);
            }

            togglePause() {
                this.paused = !this.paused;
                const overlay = document.getElementById('overlay');
                if (this.paused) {
                    document.getElementById('overlay-title').textContent = 'PAUSE';
                    document.getElementById('overlay-message').textContent = "Devam etmek için P'ye basın";
                    document.getElementById('restart-btn').style.display = 'none';
                    overlay.classList.add('active');
                } else {
                    overlay.classList.remove('active');
                }
            }

            restart() {
                this.board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
                this.score = 0;
                this.lines = 0;
                this.level = 1;
                this.gameOver = false;
                this.paused = false;
                this.busy = false;
                this.bag = [];
                this.combo = -1;
                this.backToBack = -1;
                this.lastClearWasTetris = false;
                this.dropInterval = 1000;
                this.initPieces();
                this.updateUI();
                document.getElementById('overlay').classList.remove('active');
            }

            getGhostPosition() {
                if (!this.ghostEnabled || !this.currentPiece) return null;
                
                const ghost = {
                    x: this.currentPiece.x,
                    y: this.currentPiece.y,
                    shape: this.currentPiece.shape,
                    type: this.currentPiece.type
                };
                
                while (!this.checkCollision(ghost, 0, 1)) {
                    ghost.y++;
                }
                
                return ghost;
            }
        }

        // ==================== PARÇA SINIFI ====================
        class Piece {
            constructor(type) {
                this.type = type;
                this.shape = SHAPES[type].map(row => [...row]);
                this.rotation = 0;
                this.x = 0;
                this.y = 0;
            }

            rotate(clockwise = true) {
                const n = this.shape.length;
                const newShape = Array(n).fill(null).map(() => Array(n).fill(0));
                
                for (let y = 0; y < n; y++) {
                    for (let x = 0; x < n; x++) {
                        if (clockwise) {
                            newShape[x][n - 1 - y] = this.shape[y][x];
                        } else {
                            newShape[n - 1 - x][y] = this.shape[y][x];
                        }
                    }
                }
                
                this.shape = newShape;
                this.rotation = clockwise ? 
                    (this.rotation + 1) % 4 : 
                    (this.rotation + 3) % 4;
            }
        }

        // ==================== RENDERİNG ====================
        class Renderer {
            constructor() {
                this.mainCanvas = document.getElementById('main-canvas');
                this.mainCtx = this.mainCanvas.getContext('2d');
                this.holdCanvas = document.getElementById('hold-canvas');
                this.holdCtx = this.holdCanvas.getContext('2d');
                this.nextCanvas = document.getElementById('next-canvas');
                this.nextCtx = this.nextCanvas.getContext('2d');
                this.clearingLines = [];
                this.clearAnimProgress = 0;
                
                // Patlama partikülleri + ekran sarsıntısı
                this.particles = [];
                this.shakeTime = 0;
                this.shakeIntensity = 0;
                this.lastRenderTime = 0;
                
                // Board içi arka plan foto
                this.bgImg = new Image();
                this.bgReady = false;
                this.bgImg.onload = () => { this.bgReady = true; };
                this.bgImg.src = CAT_BG_DATA_URL;
            }

            drawBlock(ctx, x, y, size, color, alpha = 1) {
                ctx.save();
                ctx.globalAlpha = alpha;
                
                // Gradient arka plan
                const gradient = ctx.createLinearGradient(x, y, x + size, y + size);
                gradient.addColorStop(0, color);
                gradient.addColorStop(1, this.darkenColor(color, 0.3));
                
                ctx.fillStyle = gradient;
                ctx.fillRect(x + 1, y + 1, size - 2, size - 2);
                
                // İç parlama
                ctx.fillStyle = this.lightenColor(color, 0.3);
                ctx.fillRect(x + 3, y + 3, size - 6, 4);
                
                // Kenarlık
                ctx.strokeStyle = this.lightenColor(color, 0.2);
                ctx.lineWidth = 1;
                ctx.strokeRect(x + 1, y + 1, size - 2, size - 2);
                
                ctx.restore();
            }

            lightenColor(color, percent) {
                const num = parseInt(color.replace('#', ''), 16);
                const amt = Math.round(2.55 * percent * 100);
                const R = Math.min(255, (num >> 16) + amt);
                const G = Math.min(255, (num >> 8 & 0x00FF) + amt);
                const B = Math.min(255, (num & 0x0000FF) + amt);
                return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
            }

            darkenColor(color, percent) {
                const num = parseInt(color.replace('#', ''), 16);
                const amt = Math.round(2.55 * percent * 100);
                const R = Math.max(0, (num >> 16) - amt);
                const G = Math.max(0, (num >> 8 & 0x00FF) - amt);
                const B = Math.max(0, (num & 0x0000FF) - amt);
                return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
            }

            drawBoard(game) {
                const ctx = this.mainCtx;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(-30, -30, this.mainCanvas.width + 60, this.mainCanvas.height + 60);
                
// Kedi arka planı (canvas içinde, blokların arkasında)
if (this.bgReady) {
    ctx.save();
    ctx.globalAlpha = 0.38;            // daha görünür
    ctx.filter = 'blur(6px)';          // yumuşat
    ctx.drawImage(this.bgImg, 0, 0, COLS * BLOCK_SIZE, ROWS * BLOCK_SIZE);
    ctx.filter = 'none';

    // Okunabilirlik için hafif karartma
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, COLS * BLOCK_SIZE, ROWS * BLOCK_SIZE);
    ctx.restore();
}


                // Grid çizgileri
                ctx.strokeStyle = 'rgba(100, 255, 218, 0.1)';
                ctx.lineWidth = 1;
                for (let x = 0; x <= COLS; x++) {
                    ctx.beginPath();
                    ctx.moveTo(x * BLOCK_SIZE, 0);
                    ctx.lineTo(x * BLOCK_SIZE, ROWS * BLOCK_SIZE);
                    ctx.stroke();
                }
                for (let y = 0; y <= ROWS; y++) {
                    ctx.beginPath();
                    ctx.moveTo(0, y * BLOCK_SIZE);
                    ctx.lineTo(COLS * BLOCK_SIZE, y * BLOCK_SIZE);
                    ctx.stroke();
                }
                
                // Board blokları
                for (let y = 0; y < ROWS; y++) {
                    for (let x = 0; x < COLS; x++) {
                        if (game.board[y][x]) {
                            const color = COLORS[game.board[y][x]];
                            const alpha = this.clearingLines.includes(y) ? 
                                Math.abs(Math.sin(this.clearAnimProgress * Math.PI * 4)) : 1;
                            this.drawBlock(ctx, x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, color, alpha);
                        }
                    }
                }
                
                // Hayalet parça
                if (game.ghostEnabled && game.currentPiece) {
                    const ghost = game.getGhostPosition();
                    if (ghost) {
                        const color = COLORS[ghost.type];
                        for (let y = 0; y < ghost.shape.length; y++) {
                            for (let x = 0; x < ghost.shape[y].length; x++) {
                                if (ghost.shape[y][x]) {
                                    this.drawBlock(ctx, 
                                        (ghost.x + x) * BLOCK_SIZE, 
                                        (ghost.y + y) * BLOCK_SIZE, 
                                        BLOCK_SIZE, color, 0.3);
                                }
                            }
                        }
                    }
                }
                
                // Aktif parça
                if (game.currentPiece) {
                    const color = COLORS[game.currentPiece.type];
                    for (let y = 0; y < game.currentPiece.shape.length; y++) {
                        for (let x = 0; x < game.currentPiece.shape[y].length; x++) {
                            if (game.currentPiece.shape[y][x]) {
                                this.drawBlock(ctx, 
                                    (game.currentPiece.x + x) * BLOCK_SIZE, 
                                    (game.currentPiece.y + y) * BLOCK_SIZE, 
                                    BLOCK_SIZE, color);
                            }
                        }
                    }
                }
            }

            drawPiece(ctx, piece, canvasWidth, canvasHeight) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                
                if (!piece) return;
                
                const size = 25;
                const offsetX = (canvasWidth - piece.shape[0].length * size) / 2;
                const offsetY = (canvasHeight - piece.shape.length * size) / 2;
                const color = COLORS[piece.type];
                
                for (let y = 0; y < piece.shape.length; y++) {
                    for (let x = 0; x < piece.shape[y].length; x++) {
                        if (piece.shape[y][x]) {
                            this.drawBlock(ctx, 
                                offsetX + x * size, 
                                offsetY + y * size, 
                                size, color);
                        }
                    }
                }
            }


            // -------------------- Partikül / Patlama Efekti --------------------
            spawnLineClearParticles(lines, game) {
                const ctx = this.mainCtx;
                const baseCountPerLine = 70; // çizgi başına partikül sayısı
                const gravity = 1200;

                for (const y of lines) {
                    for (let i = 0; i < baseCountPerLine; i++) {
                        // Satır boyunca rastgele x konumu
                        const x = (Math.random() * COLS) * BLOCK_SIZE + (BLOCK_SIZE / 2);
                        const py = y * BLOCK_SIZE + (BLOCK_SIZE / 2);

                        // Renk: o satırdaki bloklardan birinin rengine yakın seçmeye çalış
                        let color = 'rgba(100,255,218,1)';
                        if (game && game.board && game.board[y]) {
                            const filled = [];
                            for (let cx = 0; cx < COLS; cx++) {
                                if (game.board[y][cx]) filled.push(game.board[y][cx]);
                            }
                            if (filled.length) color = COLORS[filled[Math.floor(Math.random() * filled.length)]];
                        }

                        const speed = 220 + Math.random() * 520;
                        const angle = (-Math.PI / 2) + (Math.random() - 0.5) * Math.PI * 0.9; // yukarı ağırlıklı
                        const vx = Math.cos(angle) * speed;
                        const vy = Math.sin(angle) * speed;

                        this.particles.push({
                            x,
                            y: py,
                            vx,
                            vy,
                            size: 2 + Math.random() * 4,
                            life: 0,
                            maxLife: 0.55 + Math.random() * 0.35,
                            color,
                            gravity
                        });
                    }
                }
            }

            updateParticles(dt) {
                if (!this.particles.length) return;
                const t = dt / 1000;

                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.life += t;

                    // Fizik
                    p.vy += p.gravity * t;
                    p.x += p.vx * t;
                    p.y += p.vy * t;

                    // Sürüklenme
                    p.vx *= (1 - 2.5 * t);
                    p.vy *= (1 - 1.2 * t);

                    if (p.life >= p.maxLife) {
                        this.particles.splice(i, 1);
                    }
                }
            }

            drawParticles(ctx) {
                if (!this.particles.length) return;

                ctx.save();
                for (const p of this.particles) {
                    const a = 1 - (p.life / p.maxLife);
                    ctx.globalAlpha = Math.max(0, a);

                    // Hafif parıltı
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);

                    ctx.globalAlpha = Math.max(0, a * 0.25);
                    ctx.fillRect(p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
                }
                ctx.restore();
            }

            triggerShake(durationMs = 120, intensity = 6) {
                this.shakeTime = Math.max(this.shakeTime, durationMs);
                this.shakeIntensity = Math.max(this.shakeIntensity, intensity);
            }

            getShakeOffset(dt) {
                if (this.shakeTime <= 0) return { x: 0, y: 0 };

                this.shakeTime -= dt;
                const t = Math.max(0, this.shakeTime) / 120;
                const amp = this.shakeIntensity * t;

                return {
                    x: (Math.random() * 2 - 1) * amp,
                    y: (Math.random() * 2 - 1) * amp
                };
            }


            animateLineClear(lines, game) {
                this.clearingLines = lines;
                this.clearAnimProgress = 0;

                // Patlama + sarsıntı
                this.spawnLineClearParticles(lines, game);
                this.triggerShake(140, 7);
                
                const animate = () => {
                    this.clearAnimProgress += 0.1;
                    if (this.clearAnimProgress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        this.clearingLines = [];
                    }
                };
                animate();
            }

            render(game) {
                const now = performance.now();
                const dt = this.lastRenderTime ? (now - this.lastRenderTime) : 16;
                this.lastRenderTime = now;

                // Partiküller
                this.updateParticles(dt);

                // Ekran sarsıntısı (sadece ana canvas)
                const ctx = this.mainCtx;
                const off = this.getShakeOffset(dt);

                ctx.save();
                ctx.translate(off.x, off.y);

                this.drawBoard(game);
                this.drawParticles(ctx);

                ctx.restore();

                // Paneller (sarsılmasın, daha temiz)
                this.drawPiece(this.holdCtx, game.holdPiece, 120, 120);
                this.drawPiece(this.nextCtx, game.nextPiece, 120, 120);
            }
        }

        // ==================== SES SİSTEMİ ====================
        class AudioSystem {
            constructor() {
                this.ctx = null;
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    console.warn('Web Audio API not supported');
                }
            }

            playTone(frequency, duration, type = 'sine') {
                if (!this.ctx || !game.soundEnabled) return;
                
                const oscillator = this.ctx.createOscillator();
                const gainNode = this.ctx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(this.ctx.destination);
                
                oscillator.frequency.value = frequency;
                oscillator.type = type;
                
                gainNode.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                
                oscillator.start(this.ctx.currentTime);
                oscillator.stop(this.ctx.currentTime + duration);
            }

            playMove() {
                this.playTone(200, 0.05, 'square');
            }

            playRotate() {
                this.playTone(300, 0.08, 'square');
            }

            playDrop() {
                this.playTone(150, 0.15, 'sawtooth');
            }

            playLineClear() {
                this.playTone(500, 0.2, 'sine');
                setTimeout(() => this.playTone(600, 0.2, 'sine'), 100);
            }

            playGameOver() {
                this.playTone(200, 0.3, 'sawtooth');
                setTimeout(() => this.playTone(150, 0.5, 'sawtooth'), 200);
            }
        }

        // ==================== INPUT YÖNETİMİ ====================
        class InputHandler {
            constructor(game) {
                this.game = game;
                this.keys = {};
                // DAS/ARR: profesyonel Tetris hissi
                this.das = 140;   // ms: basılı tutunca ilk tekrar gecikmesi
                this.arr = 30;    // ms: sağ/sol tekrar hızı
                this.sdf = 30;    // ms: soft drop tekrar hızı
                this.keyTimers = {}; // { key: { timeoutId, intervalId } }
                
                this.setupKeyboard();
                this.setupTouch();
            }

            setupKeyboard() {
                document.addEventListener('keydown', (e) => {
                    if (this.game.gameOver) {
                        if (e.key === 'r' || e.key === 'R') {
                            this.game.restart();
                        }
                        return;
                    }
                    
                    if (e.key === 'p' || e.key === 'P') {
                        this.game.togglePause();
                        return;
                    }
                    
                    if (this.game.paused || this.game.busy) return;
                    
                    if (!this.keys[e.key]) {
                        this.keys[e.key] = true;
                        this.handleKeyPress(e.key);
                        
                        // Auto-repeat (DAS/ARR/SDF)
                        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                            this.scheduleRepeat(e.key, this.das, this.arr);
                        } else if (e.key === 'ArrowDown') {
                            // Soft drop: DAS beklemeden hızlı tekrar
                            this.scheduleRepeat(e.key, 0, this.sdf);
                        }
                    }
                });
                
                document.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                    this.clearKeyTimer(e.key);
                });
            }

            scheduleRepeat(key, delayMs, intervalMs) {
                // Önce varsa eski timer'ı temizle
                this.clearKeyTimer(key);

                const entry = { timeoutId: null, intervalId: null };
                this.keyTimers[key] = entry;

                const start = () => {
                    entry.intervalId = setInterval(() => {
                        if (this.keys[key] && !this.game.paused && !this.game.gameOver && !this.game.busy) {
                            this.handleKeyPress(key);
                        }
                    }, intervalMs);
                };

                if (delayMs > 0) {
                    entry.timeoutId = setTimeout(start, delayMs);
                } else {
                    start();
                }
            }

            clearKeyTimer(key) {
                const entry = this.keyTimers[key];
                if (!entry) return;
                if (entry.timeoutId) clearTimeout(entry.timeoutId);
                if (entry.intervalId) clearInterval(entry.intervalId);
                delete this.keyTimers[key];
            }

            handleKeyPress(key) {
                switch(key) {
                    case 'ArrowLeft':
                        this.game.movePiece(-1, 0, { manual: true });
                        break;
                    case 'ArrowRight':
                        this.game.movePiece(1, 0, { manual: true });
                        break;
                    case 'ArrowDown':
                        this.game.movePiece(0, 1, { softDrop: true, manual: true });
                        break;
                    case ' ':
                        this.game.hardDrop();
                        break;
                    case 'z':
                    case 'Z':
                        this.game.rotatePiece(false);
                        break;
                    case 'x':
                    case 'X':
                    case 'ArrowUp':
                        this.game.rotatePiece(true);
                        break;
                    case 'c':
                    case 'C':
                        this.game.holdCurrentPiece();
                        break;
                    case 'r':
                    case 'R':
                        if (this.game.gameOver) {
                            this.game.restart();
                        }
                        break;
                }
            }

            setupTouch() {
                let touchStartX = 0;
                let touchStartY = 0;
                let touchStartTime = 0;
                
                const canvas = document.getElementById('main-canvas');
                let lastTapTime = 0;
                
                canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                    touchStartTime = Date.now();
                });
                
                canvas.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    if (this.game.paused || this.game.gameOver || this.game.busy) return;
                    
                    const touchEndX = e.changedTouches[0].clientX;
                    const touchEndY = e.changedTouches[0].clientY;
                    const touchDuration = Date.now() - touchStartTime;
                    
                    const dx = touchEndX - touchStartX;
                    const dy = touchEndY - touchStartY;
                    
                    // Tap / double-tap: tek tap rotate, kısa aralıkta ikinci tap hard drop
                    if (touchDuration < 200 && Math.abs(dx) < 10 && Math.abs(dy) < 10) {
                        const now = Date.now();
                        if (now - lastTapTime < 250) {
                            this.game.hardDrop();
                            lastTapTime = 0;
                        } else {
                            this.game.rotatePiece(true);
                            lastTapTime = now;
                        }
                        return;
                    }
                    
                    // Swipe detection
                    if (Math.abs(dx) > Math.abs(dy)) {
                        if (Math.abs(dx) > 30) {
                            this.game.movePiece(dx > 0 ? 1 : -1, 0);
                        } else {
                            this.game.rotatePiece(true);
                        }
                    } else {
                        if (dy > 30) {
                            this.game.movePiece(0, 1, { softDrop: true, manual: true });
                        } else {
                            this.game.rotatePiece(true);
                        }
                    }
                });
            }
        }

        // ==================== OYUN DÖNGÜSÜ ====================
        let game, renderer, audio, input;
        let lastTime = 0;

        function init() {
            game = new Game();
            renderer = new Renderer();
            audio = new AudioSystem();
            input = new InputHandler(game);
            
            // Ayarlar
            document.getElementById('ghost-toggle').addEventListener('click', function() {
                game.ghostEnabled = !game.ghostEnabled;
                this.classList.toggle('active');
            });
            
            document.getElementById('sound-toggle').addEventListener('click', function() {
                game.soundEnabled = !game.soundEnabled;
                this.classList.toggle('active');
            });
            
            document.getElementById('restart-btn').addEventListener('click', () => {
                game.restart();
            });
            
            gameLoop(0);
        }

        function gameLoop(currentTime) {
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            
            game.update(deltaTime);
            renderer.render(game);
            
            requestAnimationFrame(gameLoop);
        }

        // Oyunu başlat
        window.addEventListener('load', init);
    </script>
</body>
</html>
